# n8n core secrets — required by the official n8n Helm chart.
#
# Usage:
#   1. Replace placeholder values below
#   2. kubectl apply -f k8s/n8n-secrets.yaml
#
# To generate an encryption key:
#   openssl rand -hex 32
#
# ⚠️  Keep N8N_ENCRYPTION_KEY safe! Losing it means all stored credentials
#     in n8n become unrecoverable.
apiVersion: v1
kind: Secret
metadata:
  name: n8n-secrets
  namespace: n8n
  labels:
    app.kubernetes.io/part-of: n8n
type: Opaque
stringData:
  N8N_ENCRYPTION_KEY: "<REPLACE: openssl rand -hex 32>"
  N8N_HOST: "n8n.your-domain.com"
  N8N_PORT: "5678"
  N8N_PROTOCOL: "http"
