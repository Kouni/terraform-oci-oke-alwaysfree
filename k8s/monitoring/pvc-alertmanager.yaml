apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  # Pre-created independently of Helm so that `helm uninstall` never deletes this PVC.
  # Mounted at /alertmanager via alertmanagerSpec.volumes + volumeMounts in values.yaml.
  name: alertmanager-data
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: storage
    app.kubernetes.io/managed-by: kubectl
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs
  resources:
    requests:
      storage: 2Gi
  # Uncomment and set volumeName when rebinding to a Released PV after accidental deletion:
  # volumeName: <pv-name>
