# kube-prometheus-stack values for OCI Always Free ARM64 OKE
#
# Deploy:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm upgrade --install kube-prom prometheus-community/kube-prometheus-stack \
#     --namespace monitoring \
#     --create-namespace \
#     -f values.yaml \
#     --set grafana.adminPassword="<your-password>"

# ──────────────── Grafana ────────────────

grafana:
  image:
    registry: docker.io
    repository: grafana/grafana

  # Do NOT embed adminPassword here — pass via --set or a pre-created Secret to avoid
  # committing credentials. Example: --set grafana.adminPassword="changeme"
  adminPassword: ""

  persistence:
    enabled: true
    # Use pre-created PVC so that `helm uninstall` does not delete Grafana data.
    # PVC must be created before helm install: kubectl apply -f pvc-grafana.yaml
    existingClaim: grafana-data

  service:
    type: ClusterIP
    port: 80

  ingress:
    enabled: false

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

  # Grafana sidecar discovers ConfigMap-based dashboards automatically
  sidecar:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

# ──────────────── Prometheus ────────────────

prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "18GB"

    # Use volumes/volumeMounts instead of storageSpec.volumeClaimTemplate so that
    # the PVC name is fully controlled (no Kubernetes-appended ordinal suffix).
    # PVC `prometheus-data` is pre-created via pvc-prometheus.yaml and survives
    # `helm uninstall` because it is not owned by the Helm release.
    storageSpec: {}

    volumes:
      - name: prometheus-db
        persistentVolumeClaim:
          claimName: prometheus-data

    volumeMounts:
      - name: prometheus-db
        mountPath: /prometheus

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

    # Scrape interval — balanced between visibility and resource usage
    scrapeInterval: "60s"
    evaluationInterval: "60s"

  service:
    type: ClusterIP

# ──────────────── Alertmanager ────────────────

alertmanager:
  alertmanagerSpec:
    # Use volumes/volumeMounts instead of storage.volumeClaimTemplate so that
    # the PVC name is fully controlled (no Kubernetes-appended ordinal suffix).
    # PVC `alertmanager-data` is pre-created via pvc-alertmanager.yaml.
    storage: {}

    volumes:
      - name: alertmanager-db
        persistentVolumeClaim:
          claimName: alertmanager-data

    volumeMounts:
      - name: alertmanager-db
        mountPath: /alertmanager

    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

  service:
    type: ClusterIP

# ──────────────── Prometheus Operator ────────────────

prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  admissionWebhooks:
    patch:
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 50m
          memory: 64Mi

# ──────────────── Node Exporter ────────────────

prometheus-node-exporter:
  resources:
    requests:
      cpu: 100m
      memory: 30Mi
    limits:
      cpu: 200m
      memory: 64Mi

# ──────────────── kube-state-metrics ────────────────

kube-state-metrics:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# ──────────────── OKE Managed Control Plane ────────────────
# OKE manages the control plane — the API server, controller-manager, scheduler,
# etcd, and kube-proxy endpoints are not accessible from within the cluster.
# Disable scraping for these components to suppress connection-refused alerts.

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeEtcd:
  enabled: false

kubeProxy:
  enabled: false
