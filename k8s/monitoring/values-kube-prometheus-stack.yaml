# ──────────────── kube-prometheus-stack Helm Values ────────────────
# Chart:   prometheus-community/kube-prometheus-stack
# Cluster: OKE Always Free — ARM64 A1.Flex, NFS storage, single node
# Scope:   Metrics + Alerting + Dashboards (Prometheus + Grafana + AlertManager)
# Access:  Cloudflare Tunnel (grafana.kouni.io) + kubectl port-forward
#
# Design principles:
#   - All workloads pinned to ARM64 nodes (nodeSelector)
#   - All persistent data on in-cluster NFS StorageClass
#   - No LoadBalancer / Ingress — ClusterIP only; Cloudflare Tunnel for egress
#   - Single replica everywhere (Always Free = no HA budget)
#   - retentionSize stays 1 Gi below PVC size to prevent TSDB OOMKill

# ──────────────── Global ────────────────
commonLabels:
  alwaysfree: "true"

# ──────────────── Prometheus ────────────────
prometheus:
  prometheusSpec:
    replicas: 1

    # Retention: 90 days by time; 4.5 GB by size (PVC is 5 Gi — 0.5 Gi buffer).
    # Sizing basis: ~5050 active series (OCI infra only) × 30s interval × 1.5 B/sample
    # ≈ 253 B/s → ~1.97 GB at 90d. retentionSize triggers auto-eviction before PVC fills.
    retention: 90d
    retentionSize: 4.5GB

    # WAL compression reduces write-ahead log size by ~20 % at negligible CPU cost.
    walCompression: true

    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1.5Gi

    # ARM64 nodes only
    nodeSelector:
      kubernetes.io/arch: arm64

    # NFS-backed TSDB; StatefulSet volumeClaimTemplate — PVC is retained on helm uninstall
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

# ──────────────── Grafana ────────────────
grafana:
  enabled: true

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi

  nodeSelector:
    kubernetes.io/arch: arm64

  # NFS-backed dashboards / user data.
  # Grafana uses a Deployment (not a StatefulSet): helm uninstall will delete its PVC
  # unless the keep annotation is present. This prevents accidental data loss when
  # re-installing or rolling back the chart.
  persistence:
    enabled: true
    storageClassName: nfs
    size: 2Gi
    annotations:
      "helm.sh/resource-policy": keep

  grafana.ini:
    server:
      # Cloudflare Tunnel public URL — must match the tunnel ingress hostname
      root_url: https://grafana.kouni.io
    security:
      # Mark session cookies as Secure since external traffic arrives over HTTPS
      cookie_secure: true
    auth:
      # Hide the username/password form — all logins go through Google OAuth.
      # Admin escape hatch: /login?disableAutoLogin still accepts password login.
      disable_login_form: true
    auth.google:
      enabled: true
      # Credentials are injected from the grafana-google-oauth Kubernetes Secret
      # (see k8s/monitoring/secret-grafana-google-oauth.yaml.example).
      client_id: ${GF_AUTH_GOOGLE_CLIENT_ID}
      client_secret: ${GF_AUTH_GOOGLE_CLIENT_SECRET}
      scopes: openid email profile
      auth_url: https://accounts.google.com/o/oauth2/v2/auth
      token_url: https://oauth2.googleapis.com/token
      api_url: https://openidconnect.googleapis.com/v1/userinfo
      # Restrict sign-in to @lcse.org Google Workspace accounts only
      allowed_domains: lcse.org
      # Auto-create Grafana user on first Google sign-in
      allow_sign_up: true
      # Skip the Grafana login page and redirect straight to Google
      auto_login: true
      # New Google-authenticated users are assigned the Viewer role (read-only).
      # Promote specific users to Editor / Admin via Grafana UI → Administration → Users.
      role_attribute_path: "'Viewer'"
  # Inject Google OAuth credentials from the grafana-google-oauth Kubernetes Secret.
  # The secret must exist before running helm upgrade:
  #   kubectl apply -f k8s/monitoring/secret-grafana-google-oauth.yaml
  envFromSecret: grafana-google-oauth
  # admin password: chart default is "prom-operator" — change immediately after first login
  # via Grafana UI (Profile → Change password) or supply at install time with:
  #   helm upgrade ... --set grafana.adminPassword='<strong-password>'
  # Do NOT commit a plaintext password here.

# ──────────────── AlertManager ────────────────
alertmanager:
  alertmanagerSpec:
    replicas: 1

    # 5-day retention for fired alert history
    retention: 120h

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

    # ARM64 nodes only
    nodeSelector:
      kubernetes.io/arch: arm64

    # NFS-backed alert state; StatefulSet volumeClaimTemplate — retained on helm uninstall
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

# ──────────────── kube-state-metrics ────────────────
kube-state-metrics:
  nodeSelector:
    kubernetes.io/arch: arm64
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ──────────────── node-exporter ────────────────
prometheus-node-exporter:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ──────────────── Prometheus Operator ────────────────
prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 512Mi

  nodeSelector:
    kubernetes.io/arch: arm64
