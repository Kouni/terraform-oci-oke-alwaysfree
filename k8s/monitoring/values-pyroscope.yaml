# ──────────────── Pyroscope Helm Values ────────────────
# Chart: grafana/pyroscope
# Repo:  https://grafana.github.io/helm-charts
#
# OKE Always Free — Single Binary, NFS storage

pyroscope:
  extraArgs:
    pyroscopedb.max-block-duration: 30m
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 768Mi

persistence:
  enabled: true
  storageClassName: nfs
  size: 10Gi

alloy:
  enabled: false    # Use external Alloy DaemonSet

nodeSelector:
  kubernetes.io/arch: arm64
