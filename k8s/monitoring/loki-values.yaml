# Grafana Loki values — single binary mode with Cloudflare R2 long-term storage
#
# Prerequisites:
#   1. Cloudflare R2 bucket created (separate from the Thanos bucket)
#   2. R2 API token with Object Read & Write permissions
#      Cloudflare Dashboard → R2 → Manage R2 API Tokens → Create API Token
#   3. Secret applied before helm install:
#      kubectl apply -f secret-loki-r2.yaml
#
# Add Helm repo (grafana repo already added for Alloy):
#   helm repo add grafana https://grafana.github.io/helm-charts
#   helm repo update
#
# Deploy:
#   helm upgrade --install loki grafana/loki \
#     --namespace monitoring \
#     -f k8s/monitoring/loki-values.yaml

# ──────────────── Mode ────────────────
# Single binary runs all Loki components in one pod — appropriate for
# a single-node Always Free cluster with low log volume.

deploymentMode: SingleBinary

# ──────────────── Core Loki config ────────────────

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  image:
    registry: docker.io
    repository: grafana/loki

  # ── Object storage (Cloudflare R2) ──
  storage:
    type: s3
    # All three bucket names must match the same R2 bucket.
    # Loki uses prefixes internally to separate chunk, ruler, and admin data.
    bucketNames:
      chunks: <your-loki-r2-bucket>
      ruler: <your-loki-r2-bucket>
      admin: <your-loki-r2-bucket>
    s3:
      endpoint: <account-id>.r2.cloudflarestorage.com
      region: auto
      # Credentials are injected from loki-r2-secret via extraEnvFrom below.
      accessKeyId: ${LOKI_R2_ACCESS_KEY_ID}
      secretAccessKey: ${LOKI_R2_SECRET_ACCESS_KEY}
      s3ForcePathStyle: true
      insecure: false

  # ── Schema ──
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h

  # ── Retention ──
  limits_config:
    retention_period: 90d

  compactor:
    retention_enabled: true
    working_directory: /tmp/loki-compactor

# ──────────────── Single Binary deployment ────────────────

singleBinary:
  replicas: 1

  # Use NFS StorageClass for WAL and ingester flush buffer.
  # Chunks are flushed to R2 regularly; 10Gi is sufficient for local WAL.
  persistence:
    storageClass: nfs
    size: 10Gi

  # Inject R2 credentials as environment variables.
  # Loki expands ${VAR} references in its config at startup.
  extraEnvFrom:
    - secretRef:
        name: loki-r2-secret

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ──────────────── Disable microservice replicas ────────────────
# Single binary mode only — these are unused.

read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0

# ──────────────── Disable caches ────────────────
# Not worth the RAM overhead on an Always Free node.

chunksCache:
  enabled: false

resultsCache:
  enabled: false

# ──────────────── Disable built-in self-monitoring ────────────────
# Prometheus and Alloy already handle monitoring for this cluster.

monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false

test:
  enabled: false
