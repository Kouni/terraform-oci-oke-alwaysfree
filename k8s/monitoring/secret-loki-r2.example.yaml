# Loki Cloudflare R2 credentials
#
# HOW TO OBTAIN:
#   Cloudflare Dashboard → R2 → Manage R2 API Tokens → Create API Token
#   Permissions: Object Read & Write on the specific Loki bucket
#
#   access_key_id:     "Access Key ID"  (shown after token creation)
#   secret_access_key: "Secret Access Key" (shown ONCE — copy immediately)
#
#   The R2 bucket endpoint format:
#     https://<account-id>.r2.cloudflarestorage.com
#   Account ID is in Cloudflare Dashboard → R2 → Overview (right side)
#
# APPLY (fill in all placeholder values first):
#   cp secret-loki-r2.example.yaml secret-loki-r2.yaml
#   # edit secret-loki-r2.yaml with real values
#   kubectl apply -f secret-loki-r2.yaml
#   # DO NOT commit secret-loki-r2.yaml — it contains credentials
#
# secret-loki-r2.yaml is in .gitignore

apiVersion: v1
kind: Secret
metadata:
  name: loki-r2-secret
  namespace: monitoring
type: Opaque
stringData:
  LOKI_R2_ACCESS_KEY_ID: <r2-access-key-id>
  LOKI_R2_SECRET_ACCESS_KEY: <r2-secret-access-key>
