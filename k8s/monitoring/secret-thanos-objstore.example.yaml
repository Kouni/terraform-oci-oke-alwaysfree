# Thanos object storage configuration for OCI Object Storage (S3-compatible API)
#
# HOW TO FIND YOUR VALUES:
#   bucket:    Name of the OCI Object Storage bucket you created
#   endpoint:  OCI Console → Object Storage → Namespace (top of page)
#              Format: <namespace>.compat.objectstorage.<region>.oraclecloud.com
#              Example: abc12xyz.compat.objectstorage.ap-osaka-1.oraclecloud.com
#   access_key: OCI Console → Identity → Users → <your user>
#               → Customer Secret Keys → Key ID (shown in the table)
#   secret_key: The secret value shown ONCE when the key was created
#               If lost, delete the key and create a new one
#
# APPLY (fill in all placeholder values first):
#   cp secret-thanos-objstore.example.yaml secret-thanos-objstore.yaml
#   # edit secret-thanos-objstore.yaml with real values
#   kubectl apply -f secret-thanos-objstore.yaml
#   # DO NOT commit secret-thanos-objstore.yaml — it contains credentials
#
# secret-thanos-objstore.yaml is in .gitignore

apiVersion: v1
kind: Secret
metadata:
  name: thanos-objstore-secret
  namespace: monitoring
type: Opaque
stringData:
  objstore.yml: |
    type: S3
    config:
      bucket: <your-bucket-name>
      endpoint: <your-oci-namespace>.compat.objectstorage.<region>.oraclecloud.com
      access_key: <customer-secret-key-id>
      secret_key: <customer-secret-key>
      insecure: false
      signature_version2: false
