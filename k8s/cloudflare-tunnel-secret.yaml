# Cloudflare Zero Trust Tunnel token — used by cloudflared Deployment.
#
# Usage:
#   1. Create tunnel: https://one.dash.cloudflare.com → Networks → Tunnels
#   2. Set Public Hostname service to: http://n8n-main:5678
#   3. Copy the tunnel token and replace the placeholder below
#   4. kubectl apply -f k8s/cloudflare-tunnel-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-tunnel
  namespace: n8n
  labels:
    app.kubernetes.io/part-of: n8n
type: Opaque
stringData:
  TUNNEL_TOKEN: "<REPLACE: your-cloudflare-tunnel-token>"
