name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please keep in mind this project is intentionally scoped to **OCI Always Free tier** resources.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve?
      placeholder: "I want to be able to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like the feature to work?
    validations:
      required: true

  - type: checkboxes
    id: always_free
    attributes:
      label: Always Free compatibility
      options:
        - label: This feature can be implemented without incurring OCI charges
          required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you considered?
