name: Bug Report
description: Report unexpected behavior or errors
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what went wrong.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Set variables: `node_count = 2`, `enable_nfs_storage = true`
        2. Run `terraform apply`
        3. Error occurs at resource `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: error_output
    attributes:
      label: Error output
      description: Paste the full error message (redact OCIDs and sensitive values).
      render: shell

  - type: input
    id: terraform_version
    attributes:
      label: Terraform version
      placeholder: "e.g. 1.7.5"
    validations:
      required: true

  - type: input
    id: oci_provider_version
    attributes:
      label: OCI provider version
      description: Found in `.terraform.lock.hcl`
      placeholder: "e.g. 5.36.0"

  - type: input
    id: oci_region
    attributes:
      label: OCI region
      placeholder: "e.g. ap-tokyo-1"
