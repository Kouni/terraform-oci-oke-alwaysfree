# grafana-values.yaml

# ── 從 Secret 讀取 admin 密碼 ───────────────────────────────
admin:
  existingSecret: grafana-admin-secret
  userKey: admin-user
  passwordKey: admin-password

# ── 資源限制 ────────────────────────────────────────────────
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 512Mi

# ── PVC：使用現有 NFS StorageClass ──────────────────────────
persistence:
  enabled: true
  storageClassName: "nfs"
  size: 5Gi

# ── Service（ClusterIP，透過 Tunnel 對外）───────────────────
service:
  type: ClusterIP
  port: 80

# ── 預設 Datasource：自動指向 Prometheus ────────────────────
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server.observability.svc.cluster.local:80
        access: proxy
        isDefault: true

# ── Grafana.ini 設定 ─────────────────────────────────────────
grafana.ini:
  server:
    domain: grafana.kouni.io
    root_url: https://grafana.kouni.io/
  feature_toggles:
    unifiedNavbars: true
    tabularNumbers: true
    dashboardNewLayouts: true
    newGauge: true

# ── 停用 test pod ────────────────────────────────────────────
testFramework:
  enabled: false
